<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Blog von Athletik Dept">
  <meta name="theme-color" content="#a32b33">
  <title>Blog | Athletik Dept</title>

  <link rel="stylesheet" href="./global.css">
  <link rel="stylesheet" href="./components/header/header.css">
  <link rel="stylesheet" href="./components/staticpage/staticpage.css">
  <link rel="stylesheet" href="./components/footer/footer.css">
  <link rel="shortcut icon" href="./assets/images/favicon.ico" type="image/x-icon">
</head>
<body>
  <a href="#main" class="skip-to-main">Zum Hauptinhalt springen</a>

  <header class="header">
    <div class="header-container">
      <div class="header-logo">
        <a href="./index.html" class="logo-link">
          <img src="./assets/images/logo+weiß.webp" alt="Athletik Dept Logo" class="logo-image">
          <span class="logo-text" data-field="nav.logo">Athletik Dept</span>
        </a>
      </div>
      <button class="header-menu-toggle" id="menuToggle" aria-label="Navigation toggle" aria-expanded="false">
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
      </button>
      <nav class="header-nav" id="headerNav">
        <ul class="nav-list" data-field="nav.items"></ul>
      </nav>
    </div>
  </header>

  <main id="main">
    <div id="static-container"></div>
  </main>

  <div id="footerComponent"></div>

  <script src="./components/header/header.js"></script>
  <script src="./components/staticpage/staticpage.js"></script>
  <script src="./components/footer/footer.js"></script>

  <script>
    const PAGE_KEY = 'blog';

    Promise.all([
      fetch('./components/staticpage/staticpage.html').then(response => response.text()),
      fetch('./data/text.json').then(response => response.json()),
      fetch('./components/staticpage/text.json').then(response => response.json())
    ])
      .then(([staticHtml, data, staticData]) => {
        document.getElementById('static-container').innerHTML = staticHtml;

        const currentPage = staticData.static.pages[PAGE_KEY];
        const mergedData = {
          ...data,
          static: {
            ...staticData.static,
            current: currentPage
          }
        };

        if (window.initStaticPage) {
          window.initStaticPage(mergedData, PAGE_KEY);
        }

        const titleElement = document.querySelector('.static-title');
        if (titleElement) {
          document.title = `${titleElement.textContent} | Athletik Dept`;
        }

        loadDataFields(mergedData);
        if (window.initHeader) window.initHeader(mergedData);
        if (window.initFooter) window.initFooter(mergedData);
      })
      .catch(error => console.error('Fehler beim Laden der Blog-Seite:', error));

    function loadDataFields(data) {
      const elements = document.querySelectorAll('[data-field]');
      elements.forEach(element => {
        const fieldPath = element.getAttribute('data-field');
        const value = getNestedValue(data, fieldPath);
        if (value !== undefined) {
          element.textContent = value;
        }
      });
    }

    function getNestedValue(obj, path) {
      return path.split('.').reduce((current, prop) => current?.[prop], obj);
    }
  </script>
</body>
</html>
