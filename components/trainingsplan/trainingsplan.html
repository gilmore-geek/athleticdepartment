<main class="trainingsplan">
  <section class="trainingsplan-intro-section">
    <div class="container">
      <h1 class="trainingsplan-heading" data-field="heading">Trainingspläne</h1>
      <p class="trainingsplan-subheading" data-field="subheading">Systematisch. Praxisnah. Individuell.</p>
      <p class="trainingsplan-intro-text" data-field="intro"></p>
    </div>
  </section>

  <section class="trainingsplan-plans-section">
    <div class="container">
      <div class="plans-grid" data-field="plans">
        <!-- Dynamisch gefuellt -->
      </div>
    </div>
  </section>

  <section class="trainingsplan-bundles-section">
    <div class="container">
      <h2 class="section-title" data-field="bundles_heading">Zusatzpakete & Bundles</h2>
      <p class="section-description" data-field="bundles_intro"></p>
      <div class="bundle-grid" data-field="bundles">
        <!-- Dynamisch gefuellt -->
      </div>
    </div>
  </section>

  <section class="trainingsplan-addon-section">
    <div class="container">
      <h2 class="section-title" data-field="addon_heading">Form-Check-Service (Add-on)</h2>
      <p class="addon-text" data-field="addon_description"></p>
      <p class="addon-note" data-field="addon_note"></p>
      <div class="addon-actions" data-field="addon_button"></div>
    </div>
  </section>
</main>
