<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TrainingsplÃ¤ne fÃ¼r Athletiktraining - systematisch, praxisnah und individuell fÃ¼r jedes Leistungsniveau.">
  <meta name="keywords" content="Trainingsplan, Athletiktraining, Krafttraining, Hannover, Coaching">
  <meta name="theme-color" content="#53687C">
  <title>TrainingsplÃ¤ne | Athletik Dept</title>
  <base href="../../">

  <link rel="stylesheet" href="./global.css">
  <link rel="stylesheet" href="./components/header/header.css">
  <link rel="stylesheet" href="./components/trainingsplan/trainingsplan.css">
  <link rel="stylesheet" href="./components/footer/footer.css">

  <link rel="shortcut icon" href="./assets/images/favicon.ico" type="image/x-icon">
</head>
<body>
  <a href="#main" class="skip-to-main">Zum Hauptinhalt springen</a>

  <header class="header">
    <div class="header-container">
      <div class="header-logo">
        <a href="./index.html" class="logo-link">
          <img src="./assets/images/logo+weiß.webp" alt="Athletik Dept Logo" class="logo-image">
          <span class="logo-text" data-field="nav.logo">Athletik Dept</span>
        </a>
      </div>
      <button class="header-menu-toggle" id="menuToggle" aria-label="Navigation toggle" aria-expanded="false">
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
        <span class="menu-icon"></span>
      </button>
      <nav class="header-nav" id="headerNav">
        <ul class="nav-list" data-field="nav.items">
          <!-- Dynamisch gefuellt von JavaScript -->
        </ul>
      </nav>
    </div>
  </header>

  <div id="main">
    <div id="trainingsplan-container">
      <!-- Dynamisch geladen -->
    </div>
  </div>

  <div id="footerComponent"></div>

  <script src="./main.js"></script>
  <script src="./components/header/header.js"></script>
  <script src="./components/trainingsplan/trainingsplan.js"></script>
  <script src="./components/footer/footer.js"></script>

  <script>
    fetch('./components/trainingsplan/trainingsplan-content.html')
      .then(response => response.text())
      .then(html => {
        document.getElementById('trainingsplan-container').innerHTML = html;
        return fetch('./components/trainingsplan/text.json');
      })
      .then(response => response.json())
      .then(data => {
        return fetch('./data/text.json').then(response => response.json())
          .then(globalData => ({ ...globalData, ...data }));
      })
      .then(data => {
        window.currentData = data;
        loadDataFields(data);

        if (window.initHeader) window.initHeader(data);
        if (window.initTrainingsplan) window.initTrainingsplan(data);
        if (window.initFooter) window.initFooter(data);
      })
      .catch(error => console.error('Fehler beim Laden der Trainingsplan-Seite:', error));

    function loadDataFields(data) {
      const elements = document.querySelectorAll('[data-field]');
      elements.forEach(element => {
        const fieldPath = element.getAttribute('data-field');
        const value = getNestedValue(data, fieldPath);
        if (value !== undefined) {
          element.textContent = value;
        }
      });
    }

    function getNestedValue(obj, path) {
      return path.split('.').reduce((current, prop) => current?.[prop], obj);
    }
  </script>
</body>
</html>
