<main class="body">
  <!-- Intro/Benefits Overlay Section -->
  <section class="intro-benefits-overlay-section">
    <!-- Intro Card (Kennst du das) -->
    <div class="intro-benefits-card intro-card active" id="introCard">
      <button class="intro-card-toggle intro-card-toggle-right" type="button" aria-label="Zu Was wäre wenn wechseln" data-card-target="benefits">
        <i class="fa-solid fa-angles-right" aria-hidden="true"></i>
      </button>
      <div class="intro-benefits-content">
        <h2 class="intro-benefits-heading" data-field="intro.heading">Kennst du das?</h2>
        <div class="problems-grid" data-field="intro.problems">
          <!-- Dynamisch gefüllt -->
        </div>
      </div>
    </div>

    <!-- Benefits Card (Was wäre wenn) -->
    <div class="intro-benefits-card benefits-card" id="benefitsCard">
      <button class="intro-card-toggle intro-card-toggle-left" type="button" aria-label="Zu Kennst du das wechseln" data-card-target="intro">
        <i class="fa-solid fa-angles-left" aria-hidden="true"></i>
      </button>
      <div class="intro-benefits-content">
        <h2 class="intro-benefits-heading" data-field="benefits.heading">Was wäre wenn?</h2>
        <div class="benefits-grid" data-field="benefits.items">
          <!-- Dynamisch gefüllt -->
        </div>
      </div>
    </div>
  </section>

  <!-- Approach Section -->
  <section class="approach-section">
    <div class="container">
      <div class="approach-content">
        <div class="approach-text">
          <p class="approach-intro" data-field="approach.intro"></p>
          <p class="approach-cta" data-field="approach.cta"></p>
          <p class="approach-description" data-field="approach.description"></p>
          <p class="approach-closing" data-field="approach.closing"></p>
        </div>
        <div class="approach-image" role="img" aria-label="Athletiktraining Bild"></div>
      </div>
    </div>
  </section>

  <!-- Services Section -->
  <section id="services" class="services-section">
    <div class="container">
      <h2 class="section-heading" data-field="services.heading">Unsere Leistungen</h2>
      <div class="services-grid" data-field="services.items">
        <!-- Dynamisch gefüllt -->
      </div>
    </div>
  </section>

  <!-- Process Section -->
  <section id="ablauf" class="process-section">
    <div class="container">
      <h2 class="section-heading" data-field="process.heading">Unser Ablauf</h2>
      <p class="process-intro" data-field="process.intro"></p>
      
      <div class="process-stages-wrapper">
        <div class="process-stage">
          <h3>Leistungsdiagnostik</h3>
          <div class="process-steps" data-field="process.diagnostics">
            <!-- Dynamisch gefüllt -->
          </div>
        </div>

        <div class="process-stage">
          <h3>Ergebnisanalyse</h3>
          <div class="process-steps" data-field="process.analysis">
            <!-- Dynamisch gefüllt -->
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Testimonials Section -->
  <section class="testimonials-section">
    <div class="container">
      <h2 class="section-heading" data-field="testimonials.heading">Was unsere Kunden sagen</h2>
      <p class="testimonials-intro" data-field="testimonials.intro"></p>
      
      <div class="testimonials-container">
        <!-- Autorenliste (Buttons zum Wechseln) -->
        <div class="testimonials-authors" id="testimonialsAuthors">
          <!-- Dynamisch gefüllt -->
        </div>

        <!-- Aktuelles Zitat (großes Display) -->
        <div class="testimonials-display">
          <p class="testimonial-quote-large" id="testimonialQuote">
            <!-- Dynamisch gefüllt -->
          </p>
          <div class="testimonial-info">
            <p class="testimonial-author-large" id="testimonialAuthor">
              <!-- Dynamisch gefüllt -->
            </p>
            <p class="testimonial-title-large" id="testimonialTitle">
              <!-- Dynamisch gefüllt -->
            </p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Team Section -->
  <section id="team" class="team-section">
    <div class="container">
      <h2 class="section-heading" data-field="team.heading">Über uns</h2>
      <p class="team-approach" data-field="team.approach"></p>
      <div class="team-members" data-field="team.members">
        <!-- Dynamisch gefüllt -->
      </div>
    </div>
  </section>

  <!-- CTA Section -->
  <section id="kontakt" class="cta-section">
    <div class="container">
      <div class="cta-grid">
        <div class="cta-copy">
          <h2 class="cta-heading" data-field="cta.heading">Interesse geweckt?</h2>
          <h3 class="cta-subheading" data-field="cta.subheading">Buche jetzt einen Termin</h3>
          <p class="cta-description" data-field="cta.description"></p>
        </div>
        <div class="cta-form-card">
          <div class="cta-form-frame">
            <iframe class="cta-form-iframe" src="https://athletikdept.zohobookings.eu/portal-embed#/240005000000038052" title="Kontaktformular" allowfullscreen scrolling="no"></iframe>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
